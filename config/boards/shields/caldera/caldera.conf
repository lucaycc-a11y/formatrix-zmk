# ForMatrix (Caldera) Base Config

# Enable deep sleep for battery saving
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Enable Bluetooth
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="ForMatrix"

# Battery monitoring
CONFIG_ZMK_BATTERY_REPORTING=y

# USB
CONFIG_USB=y
CONFIG_USB_DEVICE_MANUFACTURER="FORM LABS"
CONFIG_USB_DEVICE_PRODUCT="ForMatrix"
